<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Dashboard</title>
    <meta name="robots" content="noindex,nofollow">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Dashboard">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

</head>
<body>

    <div class="header">
        <div id="date">0000/00/00 (---)</div>
        <div id="clock">00:00:00</div>
    </div>

    <div id="home" class="page-content active">
        
        <div class="section today-highlight">
            <h2>📌 今日の予定</h2>
            <div id="today-event-text">予定はありません</div>
        </div>
        
        <div class="section">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <h2 id="link-section-title" style="margin: 0;">クイックリンク</h2>
                <button onclick="openLinkEditor()" style="background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer;">
                    編集
                </button>
            </div>
            <div id="link-grid-container" class="link-grid"></div>
        </div>

        <div id="link-editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; padding:20px; box-sizing:border-box;">
            <div style="background:#2d2d2d; border-radius:15px; padding:20px; max-width:400px; margin:auto; position:relative;">
                <h3 id="editor-title" style="margin-top:0;">🔗 リンク編集</h3>
                <button onclick="toggleUraMode()" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; margin-bottom:10px;">1/2 切替</button>
                <div id="editor-link-list" style="max-height:300px; overflow-y:auto; margin-bottom:15px;"></div>
                <input type="text" id="new-link-name" placeholder="名前" style="width:100%; margin-bottom:5px; padding:8px; border-radius:5px; background:#1a1a1a; color:white; border:1px solid #444;">
                <input type="text" id="new-link-url" placeholder="URL" style="width:100%; margin-bottom:10px; padding:8px; border-radius:5px; background:#1a1a1a; color:white; border:1px solid #444;">
                <div style="display:flex; gap:10px;">
                    <button onclick="addLink()" style="flex:1; background:var(--accent); color:white; border:none; padding:10px; border-radius:10px;">追加</button>
                    <button onclick="closeLinkEditor()" style="flex:1; background:#555; color:white; border:none; padding:10px; border-radius:10px;">閉じる</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>✅ ToDo・コレクション</h2>
            <div id="todo-category-bar" style="display: flex; gap: 5px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 5px;"></div>
            
            <div style="display: flex; gap: 5px; margin-bottom: 12px;">
                <input type="text" id="todo-input" placeholder="新しい項目を追加..." style="flex: 1; background: #3d3d3d; border: 1px solid var(--accent); color: white; border-radius: 10px; padding: 10px; outline: none;">
                <button onclick="addTodoItem()" ontouchstart="addTodoItem(); event.preventDefault();" class="nav-btn" style="border-radius: 10px; padding: 0 15px;">＋</button>
            </div>

            <div class="filter-bar" style="display: flex; gap: 5px; margin-bottom: 12px;">
                <button onclick="setTodoFilter('all')" class="filter-btn active" id="f-all">全部</button>
                <button onclick="setTodoFilter('active')" class="filter-btn" id="f-active">未達成</button>
                <button onclick="setTodoFilter('completed')" class="filter-btn" id="f-completed">達成済</button>
            </div>

            <div id="todo-list-container"></div>
            
            <button onclick="createTodoCategory()" style="margin-top:15px; font-size: 0.8rem; background: none; border: 1px dashed var(--accent); color: var(--accent); width: 100%; padding: 8px; border-radius: 10px;">＋ カテゴリーを増やす</button>
        </div>
    </div>

    <div id="notes-all" class="page-content">
        <div class="section">
           <h2>🗒️ メモ</h2>
           <textarea id="daily-memo" oninput="saveDailyMemo()" placeholder="" style="height: 100px;"></textarea>
        </div>

        <div class="section">
            <h2>📌 付箋</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="color" id="note-color" value="#00adb5" style="width: 50px; height: 38px; border: none; background: none;">
                <button onclick="addStickyNote()" class="nav-btn" style="flex: 1;">付箋を追加</button>
            </div>
            <div id="sticky-container" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
        </div>

        <div class="section">
            <h2>📝 ネタ帳</h2>
            <div id="tab-bar" style="display: flex; overflow-x: auto; margin-bottom: 10px; padding-bottom: 5px;"></div>
            <textarea id="idea-note" oninput="saveCurrentIdea()" placeholder="" style="height: 150px;"></textarea>
            <button onclick="createNewPage()" class="nav-btn" style="margin-top: 8px; width: 100%;">＋ 新しいページ</button>
        </div>
    </div>

    <div id="calendar" class="page-content">
        <div class="section">
            <div class="calendar-header">
                <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                <h2 id="calendar-month">2026年 2月</h2>
                <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
            <table class="calendar-table">
                <thead><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr></thead>
                <tbody id="calendar-body"></tbody>
            </table>
            <span id="selected-date-label">日付を選択してください</span>
            <textarea id="event-input" rows="3" placeholder="" oninput="saveEvent()"></textarea>
        </div>
    </div>

    <div id="timetable" class="page-content">
        <div class="section">
            <h2>🕒 時間割</h2>
            <div id="semester-tabs" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px;"></div>
            
            <p style="font-size: 0.65rem; color: var(--accent); margin-bottom: 5px; text-align: right;">⇄ 横にスクロールできます</p>

            <div class="timetable-scroll-wrapper">
                <table class="timetable-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>月</th>
                            <th>火</th>
                            <th>水</th>
                            <th>木</th>
                            <th>金</th>
                        </tr>
                    </thead>
                    <tbody id="timetable-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="tab-menu">
        <button onclick="showPage('home')">🏠<br>ホーム</button>
        <button onclick="showPage('shift')">⚒️<br>シフト</button>
        <button onclick="showPage('timetable')">🕒<br>時間割</button> 
        <button onclick="showPage('notes-all')">📒<br>ノート</button> 
        <button onclick="showPage('calendar')">📅<br>予定表</button>
    </div>



    <div id="shift" class="page-content">
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button onclick="changeShiftMonth(-1)" class="nav-btn" style="padding: 5px 12px;">◀</button>
                         <h2 id="shift-month-title" style="margin: 0; min-width: 120px; text-align: center; border: none;">2026年 2月</h2>
                    <button onclick="changeShiftMonth(1)" class="nav-btn" style="padding: 5px 12px;">▶</button>
                </div>
                <button onclick="openShiftEditor(1)" class="nav-btn" style="font-size: 0.7rem; padding: 8px 12px;">一括編集</button>
            </div>
        
            <div id="shift-list-container" style="width: 100%;">
            </div>
        </div>
    </div>


    <div id="shift-editor-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; padding:10px; box-sizing:border-box;">
        <div style="background:#2d2d2d; border-radius:15px; padding:20px; max-width:400px; margin:20px auto; text-align:center; color:white; font-family:sans-serif;">
            <h3 id="edit-date-display" style="margin:0 0 20px 0; font-size:1.2rem;">2月 1日 (月)</h3>
        
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:25px;">
                <button id="btn-work-on" onclick="setWorkStatus(true)" style="flex:1; padding:12px; border-radius:10px; border:none; background:#444; color:white; font-weight:bold;">出勤</button>
                <button id="btn-work-off" onclick="setWorkStatus(false)" style="flex:1; padding:12px; border-radius:10px; border:none; background:#444; color:white; font-weight:bold;">休み</button>
            </div>

            <div id="shift-time-ui" style="display:block; background:#1a1a1a; border-radius:15px; padding:15px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-around; align-items:center; position:relative;">
        
                    <div class="picker-container">
                        <div class="picker-label">開始</div>
                        <div class="drum-wrapper">
                            <div class="drum-viewport" id="drum-s-hour"></div>
                            <span class="drum-sep">:</span>
                            <div class="drum-viewport" id="drum-s-min"></div>
                        </div>
                    </div>

                <div style="font-size:1.2rem; color:#555; margin-top:20px;">▶</div>

                <div class="picker-container">
                    <div class="picker-label">終了</div>
                    <div class="drum-wrapper">
                        <div class="drum-viewport" id="drum-e-hour"></div>
                        <span class="drum-sep">:</span>
                        <div class="drum-viewport" id="drum-e-min"></div>
                    </div>
                </div>

            <div class="picker-selection-bar"></div>
        </div>
    </div>


        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <button onclick="moveShiftDate(-1)" class="nav-btn" style="width:50px; height:50px; font-size:1.2rem;">◀</button>
            <div style="display:flex; gap:10px;">
                <button onclick="closeShiftEditor(false)" style="background:#444; color:white; border:none; padding:12px 20px; border-radius:10px;">中止</button>
                <button onclick="closeShiftEditor(true)" style="background:var(--accent); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold;">完了</button>
            </div>
            <button onclick="moveShiftDate(1)" class="nav-btn" style="width:50px; height:50px; font-size:1.2rem;">▶</button>
        </div>
    </div>
</div>

<style>
/* スマホのドラムロールを呼び出すためのスタイル */
.drum-select {
    background: #333;
    color: white;
    border: 1px solid #444;
    border-radius: 8px;
    font-size: 1.4rem;
    padding: 8px 4px;
    width: 60px;
    text-align: center;
    /* デフォルトの矢印を消してドラムロール感を出す */
    appearance: none;
    -webkit-appearance: none;
}
</style>



        <script src="script.js"></script>


</body>

    <div id="data-sync-wrapper" style="position: absolute; top: 15px; right: 15px; z-index: 9999;">
        <button onclick="toggleDataMenu(event)" style="width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
            ⇄
        </button>
    
        <div id="data-menu" style="display: none; position: absolute; top: 45px; right: 0; background: #222; border: 1px solid #444; border-radius: 10px; width: 160px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden;">
         <div onclick="exportData()" style="padding: 15px; font-size: 0.85rem; border-bottom: 1px solid #333; color: #fff;">データをコピーする</div>
            <div onclick="importData()" style="padding: 15px; font-size: 0.85rem; color: #fff;">データを読み込む</div>
        </div>
    </div>


</html>
